<!DOCTYPE html>
<html>
<body>

<h2>Attendance</h2>

<input id="nrp" placeholder="NRP"><br>
<input id="name" placeholder="Nama"><br>

<button onclick="getLocation()">Get Location</button>
<p id="loc"></p>

<button onclick="startCamera()">Start Camera</button>
<video id="video" autoplay></video>
<canvas id="canvas"></canvas>
<button onclick="takePhoto()">Take Photo</button>

<button onclick="submitData()">Submit</button>

<p id="msg"></p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwgHo0Q9-Z0cVdxxTYDk_KFtvj6hR_91hlcVvGXfVhr74TUw-V9cNM-_19o_OZ1wNyL1w/exec";

let stream;
let locationData;
let photoTaken = false;

// LOCATION
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude.toFixed(6);
    const lng = pos.coords.longitude.toFixed(6);

    locationData = {
      lat,
      lng,
      mapUrl: `https://www.google.com/maps?q=${lat},${lng}`
    };

    document.getElementById("loc").innerText =
      `${lat}, ${lng}`;
  });
}

// CAMERA
async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById("video").srcObject = stream;
}

// FOTO + WATERMARK
function takePhoto() {
  if (!locationData) {
    alert("Ambil lokasi dulu");
    return;
  }

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  ctx.fillStyle = "white";
  ctx.strokeStyle = "black";
  ctx.lineWidth = 3;
  ctx.font = "16px Arial";

  const text = [
    `NRP: ${document.getElementById("nrp").value}`,
    `Lat: ${locationData.lat}`,
    `Lng: ${locationData.lng}`,
    `Time: ${new Date().toLocaleString()}`
  ];

  let y = canvas.height - 80;

  text.forEach(line => {
    ctx.strokeText(line, 10, y);
    ctx.fillText(line, 10, y);
    y += 20;
  });

  photoTaken = true;
}

// SUBMIT
async function submitData() {
  console.log("SUBMIT DIKLIK");

  try {
    if (!photoTaken) {
      alert("Ambil foto dulu");
      return;
    }

    if (!locationData) {
      alert("Ambil lokasi dulu");
      return;
    }

    const data = {
      nrp: document.getElementById("nrp").value,
      name: document.getElementById("name").value,
      status: "Present",
      latitude: locationData.lat,
      longitude: locationData.lng,
      mapUrl: locationData.mapUrl,
      timestamp: new Date().toISOString(),
      photo: document.getElementById("canvas").toDataURL()
    };

    console.log("DATA:", data);

    const res = await fetch(API_URL, {
  method: "POST",
  mode: "no-cors",   // 👈 TAMBAHKAN INI
  headers: {
    "Content-Type": "text/plain"
  },
  body: JSON.stringify(data)
});

    console.log("RESPONSE:", res);

    document.getElementById("msg").innerText = "Data berhasil dikirim!";
  } catch (err) {
    console.error("ERROR:", err);
    alert("Error: " + err.message);
  }
}
</html>
